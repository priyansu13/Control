<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var l = window.location;
        var base = "/CM/";
        var path = l.pathname.startsWith(base)
          ? l.pathname.slice(base.length)
          : l.pathname.slice(1);
        var redirect =
          base +
          "?p=" +
          encodeURIComponent(path) +
          "&q=" +
          encodeURIComponent(l.search.slice(1)) +
          "&h=" +
          encodeURIComponent(l.hash.slice(1));
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
